name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon (arm64)
            target: '--mac'
          - os: macos-13 # Intel (x64)
            target: '--mac'
          - os: windows-latest
            target: '--win'
          - os: ubuntu-latest
            target: '--linux'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Remove Fabric's optional node-canvas: we only use the browser canvas, and
      # rebuilding node-canvas needs a full VS/GTK toolchain that breaks on Windows.
      - name: Drop optional node-canvas
        shell: bash
        run: rm -rf node_modules/canvas

      # Bundle main/preload/renderer (electron-vite), then package + publish.
      - run: npm run build

      - name: Package & publish (${{ matrix.target }})
        run: npx electron-builder ${{ matrix.target }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code-signing (optional): add these repo secrets to enable signing +
          # notarization. When CSC_LINK is empty, signing is auto-skipped and an
          # unsigned build is produced (still fully functional).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
