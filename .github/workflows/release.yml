name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon (arm64)
            target: '--mac'
          - os: windows-latest
            target: '--win'
          - os: ubuntu-latest
            target: '--linux'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Remove Fabric's optional node-canvas: we only use the browser canvas, and
      # rebuilding node-canvas needs a full VS/GTK toolchain that breaks on Windows.
      - name: Drop optional node-canvas
        shell: bash
        run: rm -rf node_modules/canvas

      # Bundle main/preload/renderer (electron-vite), then package + publish.
      - run: npm run build

      # Code-signing is optional. Only export the signing env vars when a cert
      # secret is actually present — passing an empty CSC_LINK makes
      # electron-builder treat "" as a cert path and fail. With no secret we
      # force-skip signing and produce a working unsigned build.
      - name: Configure signing
        shell: bash
        env:
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$CSC_LINK_SECRET" ]; then
            echo "Signing enabled."
            {
              echo "CSC_LINK=$CSC_LINK_SECRET"
              echo "CSC_KEY_PASSWORD=$CSC_KEY_PASSWORD_SECRET"
              echo "APPLE_ID=$APPLE_ID_SECRET"
              echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD_SECRET"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID_SECRET"
            } >> "$GITHUB_ENV"
          else
            echo "No signing cert — producing an unsigned build."
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      - name: Package & publish (${{ matrix.target }})
        run: npx electron-builder ${{ matrix.target }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
