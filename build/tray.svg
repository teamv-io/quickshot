<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Monochrome menubar / system-tray glyph. macOS recolors black pixels to
       match the tint of the menu bar (template image), so we draw a solid
       outline plus a center dot without any fill. -->
  <g fill="none" stroke="#000000" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 6 11 L 6 6 L 11 6" />
    <path d="M 21 6 L 26 6 L 26 11" />
    <path d="M 26 21 L 26 26 L 21 26" />
    <path d="M 11 26 L 6 26 L 6 21" />
  </g>
  <circle cx="16" cy="16" r="3" fill="#000000" />
</svg>
